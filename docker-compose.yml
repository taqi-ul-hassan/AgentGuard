services:
  backend:
    build:
      context: ./backend
    container_name: agent-guard-backend
    environment:
      APP_NAME: ${APP_NAME:-Agent Guard API}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_PREFIX: ${API_PREFIX:-/v1}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      FIREWORKS_CLINICAL_MODEL: ${FIREWORKS_CLINICAL_MODEL:-accounts/fireworks/models/llama-v3p1-8b-instruct}
      FIREWORKS_VERIFIER_MODEL: ${FIREWORKS_VERIFIER_MODEL:-accounts/fireworks/models/llama-v3p1-8b-instruct}
      MODEL_TIMEOUT_SECONDS: ${MODEL_TIMEOUT_SECONDS:-30}
      DATABASE_URL: sqlite:////data/agent_guard.db
      POLICY_PATH: ${POLICY_PATH:-app/policies/default_clinical_policies.yaml}
      ENABLE_LOCAL_ROCM: ${ENABLE_LOCAL_ROCM:-false}
      LOCAL_ROCM_BASE_URL: ${LOCAL_ROCM_BASE_URL:-http://localhost:8001/v1}
      LOCAL_ROCM_TIMEOUT_SECONDS: ${LOCAL_ROCM_TIMEOUT_SECONDS:-60}
    ports:
      - "8000:8000"
    volumes:
      - audit_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
    container_name: agent-guard-frontend
    environment:
      AGENT_GUARD_API_BASE_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  audit_data:
